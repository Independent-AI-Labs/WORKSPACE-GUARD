# Sandbox profile auto-selection table.
#
# Used by workspace-sandbox-launcher when invoked with `--profile auto`
# (see docs/specifications/SPEC-SANDBOX.md section 2.2). First match
# wins; patterns are anchored on the full hostname via `[[ $host =~ $pat ]]`.
#
# Profiles (SPEC-SANDBOX.md section 2):
#   rootless     Sandlock (Apache 2.0) ,  ~6ms cold start
#   gvisor       gVisor runsc ,  ~200ms cold start
#   firecracker  Firecracker microVM ,  ~125ms cold start

profiles:
  - pattern: ".*-agent"
    profile: rootless

  - pattern: ".*-untrusted"
    profile: gvisor

  - pattern: ".*-critical"
    profile: firecracker

  - pattern: ".+"
    profile: rootless    # catch-all default for auto mode (non-empty hostname)
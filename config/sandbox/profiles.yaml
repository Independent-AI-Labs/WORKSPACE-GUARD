# Sandbox profile auto-selection table.
#
# Used by workspace-sandbox-launcher when invoked with `--profile auto`
# (see docs/specifications/SPEC-SANDBOX.md section 2.2). First match
# wins; patterns are anchored on the full hostname via `[[ $host =~ $pat ]]`.
#
# Profiles (SPEC-SANDBOX.md section 1):
#   rootless     Landlock + seccomp + namespaces + cgroups (~5ms cold start)
#   gvisor       gVisor runsc Sentry (~200ms cold start, no host kernel syscall)
#   firecracker  Firecracker microVM with separate guest kernel (~125ms cold start)

profiles:
  - pattern: ".*-agent"
    profile: rootless

  - pattern: ".*-untrusted"
    profile: gvisor

  - pattern: ".*-critical"
    profile: firecracker

  - pattern: ".*"
    profile: rootless    # catch-all default for auto mode
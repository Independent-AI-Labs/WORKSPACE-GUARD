# workspace-guard locked path policy.
#
# Single source of truth for which files and directory trees the guard
# locks to root:root in capability mode.  Compiled into the guard binary
# at build time via build.rs.
#
# Schema:
#   version                : schema version (currently 1).
#   recursive_tree_paths   : paths (relative to repo root) whose entire
#                            directory tree is locked recursively.
#                            Dirs → 0o755, files → 0o644,
#                            hook files under hooks/ → 0o755.
#   individual_file_paths  : individual file paths (relative to repo root)
#                            to lock with an explicit mode (octal).
#   recursive_tree_glob_patterns : directory-name glob patterns.  Every
#                                  directory in the repo tree whose name
#                                  matches is recursively locked.
#                                  Dirs -> 0o755, files -> 0o644.
#   individual_file_paths  : individual file paths (relative to repo root)
#                            to lock with an explicit mode (octal).
#   glob_patterns          : filename-only glob patterns. Every file in the
#                            repo tree whose name matches is locked with
#                            the given mode (octal).
#   absolute_file_paths    : absolute paths (with an optional leading ~ for
#                            the current user $HOME, or a literal /root/ path
#                            for root) of files OUTSIDE the repo tree that
#                            the home-lock program (scripts/install-home-
#                            lock) chowns to root:root and mode-sets so an
#                            attacker cannot bypass the in-repo lock via a
#                            direct file write to ~/.gitconfig /
#                            ~/.ssh/config / authorized_keys. Private id_*
#                            keys and shell rc files are deliberately NOT
#                            listed here: chowning them would break ssh and
#                            interactive shells. Edit via `sudoedit <path>`
#                            (root owns them; root reads and writes them
#                            directly, no lock/relock dance required).

version: 1

recursive_tree_paths:
  - .git

recursive_tree_glob_patterns:
  - ".boot*"

individual_file_paths:
  ".gitmodules": 0o644

# prune_dir_names: directory names the recursive glob scans
# (glob_patterns, recursive_tree_glob_patterns) never descend into.
# These trees are huge, regenerated, and carry no policy files; walking
# them made every guarded git invocation O(worktree size) once the lock
# ran per-call (item 21). .git is always pruned (locked separately).
prune_dir_names:
  - node_modules
  - .next
  - target
  - .venv
  - venv
  - dist
  - build
  - .turbo
  - .cache
  - __pycache__

glob_patterns:
  "*_exceptions.yaml": 0o644
  ".markdown_docs_exceptions.yaml": 0o644
  "coverage_thresholds.yaml": 0o644
  "file_length_limits.yaml": 0o644
  "dead_code.yaml": 0o644
  "*_excludes.yaml": 0o644
  "exemption_files.yaml": 0o644

absolute_file_paths:
  "~/.gitconfig": 0o644
  "~/.config/git/config": 0o644
  "~/.gitconfig.local": 0o644
  "~/.ssh/authorized_keys": 0o600
  "~/.ssh/config": 0o644
  "/root/.gitconfig": 0o644
  "/root/.ssh/authorized_keys": 0o600
  "/root/.ssh/config": 0o644

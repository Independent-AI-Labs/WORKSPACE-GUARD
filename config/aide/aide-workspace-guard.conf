# AIDE configuration snippet for WORKSPACE-GUARD.
# Installed to /etc/aide/aide.conf.d/99-workspace-guard when AIDE is present.
# See docs/specifications/SPEC-AUDIT.md section 3.1.

# Tracking attributes: p+i+n+u+g+s+m+c+sha256
#   p  perms, i  inode, n  num links, u  owner, g  group,
#   s  size, m  mtime, c  ctime, sha256

# Every relocated real binary (mode 0700 root:root, chattr +i)
/usr/bin/\.real$ p+i+n+u+g+s+m+c+sha256
/usr/sbin/\.real$ p+i+n+u+g+s+m+c+sha256

# Every guard binary sitting at the original path
/usr/bin/(sudo|su|mount|umount|passwd|gpasswd|chsh|chfn|newgrp|newuidmap|newgidmap|fusermount3|pkexec) p+i+n+u+g+s+m+c+sha256

# Identity and authentication files
/etc/passwd  p+i+n+u+g+s+m+c+sha256
/etc/shadow  p+i+n+u+g+s+m+c+sha256
/etc/group  p+u+g+s+m+c+sha256
/etc/gshadow  p+u+g+s+m+c+sha256
/etc/sudoers  p+u+g+s+m+c+sha256
/etc/sudoers\.d/.*  p+u+g+s+m+c+sha256

# Audit ruleset
/etc/audit/rules\.d/.*  p+u+g+s+m+c+sha256
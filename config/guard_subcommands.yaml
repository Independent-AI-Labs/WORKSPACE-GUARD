# workspace-guard subcommand policy.
#
# Single source of truth for which git subcommands are blocked,
# partially blocked, or subject to WORKSPACE-CI contract checks.
# Compiled into the guard binary at build time via build.rs.
#
# Schema:
#   version          : schema version (currently 1).
#   blocked          : git subcommands unconditionally denied (even for sudo).
#   sudo_gated       : git subcommands denied for non-root, allowed for root.
#   partial          : git subcommands subject to conditional/flag-based blocking.
#   contract_check   : git subcommands that must pass WORKSPACE-CI quality gates.

version: 1

blocked:
  - reset
  - clean
  - gc
  - prune
  - bisect
  - filter-branch
  - filter-repo
  - worktree
  - reflog
  - replace
  - lfs
  - daemon
  - fast-import
  # Plumbing commands that bypass porcelain subcommand blocks (reset-equivalent).
  - update-ref
  - read-tree
  - symbolic-ref
  - write-tree
  - commit-tree
  # Plumbing commands that mutate index/worktree (checkout.c / update-index bypass).
  - checkout-index
  - update-index
  - merge-file
  - merge-index

sudo_gated:
  - submodule
  - checkout
  - switch
  - restore

partial:
  - rm
  - stash
  - branch
  - push
  - commit
  - revert
  - pull
  - merge
  - rebase
  - tag
  - cherry-pick
  - apply
  - am

contract_check:
  - commit
  - push
  - cherry-pick
  - apply
  - am

# WORKSPACE-GUARD Test Coverage Thresholds
#
# Rust coverage tooling (tarpaulin/llvm-cov) cannot run under PRoot, so
# coverage measurement is disabled — the suite runs `cargo test --workspace`
# and verifies pass/fail only.

version: 1

unit:
  path: tests
  source_path: src
  runner: cargo test --workspace
  coverage: false
  min_coverage: 1
  timeout: 600
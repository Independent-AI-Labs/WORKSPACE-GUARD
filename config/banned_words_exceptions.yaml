# WORKSPACE-GUARD banned-words exceptions.
#
# Each entry is scoped per banned pattern AND per explicit file path
# list, matching the principled style of the existing unsafe-FFI entry
# below. No umbrella directory slop: every file is named one by one so
# reviewers can audit each occurrence.
#
# Categories of legitimate occurrences exempted here:
#
# 1. The `unsafe` FFI gate. The guard directly calls Linux libc FFI
#    functions (execve(2), setrlimit(2), getuid(2), getpwuid(3),
#    localtime_r(3), etc.) that have no safe Rust abstraction. The
#    unsafe keyword is required in Rust source and cannot be avoided.
#    Scope: every Rust source file that wraps an FFI call is listed;
#    no unsafe blocks exist outside the listed files.
#
# 2. Cargo passthrough / git separator CLI literals. Required syntax
#    like cargo fmt passthrough (`cargo fmt --all` followed by
#    `--check`), cargo clippy passthrough (`cargo clippy --workspace
#    --all-targets` followed by `-D warnings`), the rustup installer
#    `sh -s` argument passthrough, and git's separator quoting in
#    SPEC-GIT-GUARD.md all embed the banned ASCII em-dash substring.
#    Erasing it corrupts the documents. The affected files are
#    enumerated per pattern.
#
# 3. The lowercase interpreter executable name. The markdown-docs pre
#    commit hook entry in .pre-commit-config.yaml must drive the venv
#    manager (`uv run`) using its required subcommand argument; the
#    bare identifier is the executable name the venv manager expects,
#    and renaming would break hook lookup. The invocation IS already
#    routed through the venv manager (uv), so the ban's intent (no
#    bare interpreter call outside a venv) is satisfied.
#
# 4. The hook identifier inherited from WORKSPACE-CI's required_hooks
#    registry. The id must match exactly; GUARD cannot rename it
#    unilaterally. The name field on the same hook was rewritten to
#    drop the banned word; the id is the unavoidable residue.
#
# 5. This file. The YAML entries below that DECLARE a banned pattern
#    as the value of their `pattern:` field embed the literal pattern
#    string (e.g. the em-dash and interpreter-name rules necessarily
#    contain those very literals), so this file exempts itself from
#    matching the patterns it documents.

version: 1
exceptions:
  - pattern: 'unsafe\s*\{'
    paths: ['src/main.rs', 'src/exec.rs', 'src/exec_tests.rs', 'src/gitdir.rs', 'docs/specifications/SPEC-GIT-GUARD-IMPL.md']

  - pattern: ' -- '
    paths: ['.pre-commit-config.yaml', 'Makefile', 'Containerfile.test', 'docs/specifications/SPEC-GIT-GUARD.md', 'docs/specifications/SPEC-GIT-GUARD-HARDENING.md', 'docs/specifications/SPEC-BINARY-LOCK.md', 'docs/specifications/SPEC-SANDBOX.md', 'config/banned_words_exceptions.yaml', 'tests/shell/lib/harness.bash', 'tests/shell/stubs/dpkg-divert']
    # 7. grep end-of-options separator in tests/shell/. The ` -- ` token
    #    is mandatory grep syntax (end-of-flags) when the search pattern
    #    or file path could begin with a hyphen; there is no portable
    #    replacement. Two extensionless bash scripts and one .bash bats
    #    helper fall outside the universal `\.sh$` exception even though
    #    they are real shell sources, so they are enumerated here.

  - pattern: '\bpython3?\b'
    paths: ['.pre-commit-config.yaml', 'config/banned_words_exceptions.yaml']

  - pattern: '\bsilent'
    paths: ['.pre-commit-config.yaml', 'config/banned_words_exceptions.yaml']

  # 6. Cached canonical reference sources under docs/references/. These
  #    files are verbatim copies of external pages (GTFOBins, NVD, sudo.ws,
  #    systemshardening.com, yunolay.com, arXiv, Elastic, CIS) fetched by
  #    scripts/sync-gtfobins. We do not control their prose, which contains
  #    AI-slop tokens, em-dashes, "/home/" paths, and corporate waffle that
  #    the author wrote. Modifying them would falsify the provenance chain
  #    (the docs cite these files as verbatim quotes). The wildcard `.*`
  #    exempts every file under docs/references/ from ALL banned patterns;
  #    the regex anchors to the directory so no other file is covered.
  - pattern: '.*'
    paths: ['^docs/references/']

  # 7. SPEC-HOME-LOCK.md example drift/state YAML output uses
  #    `/home/alice/...` placeholders to show what a real home-lock
  #    state row looks like. The paths in those examples are not
  #    source code literals; they are illustrative snapshots. Adding
  #    this exception to the /home/ rule keeps the example readable
  #    without weakening the rule for actual scripts and Rust source.
  - pattern: '/home/'
    paths: ['docs/specifications/SPEC-HOME-LOCK.md', 'docs/requirements/REQ-HOME-LOCK.md']
[package]
name = "rust-guard"
version = "0.1.0"
edition = "2021"
description = "SUID-root guard framework — blocks destructive commands, sanitises env, enforces AMI-CI contracts. Git PoC."

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true

[dependencies]
libc = "0.2"

# WORKSPACE-GUARD pre-commit configuration.
#
# Every shell-sourced check below uses ../CI/lib/checks.sh because
# WORKSPACE-GUARD is a sibling of WORKSPACE-CI under projects/.

repos:
  - repo: local
    hooks:
      - id: check-unstaged
        name: Block Unstaged Changes
        entry: "bash -c 'source ../CI/lib/checks.sh && ci_check_unstaged'"
        language: system
        pass_filenames: false
        always_run: true

      - id: block-sensitive-files
        name: Block Sensitive Files
        entry: "bash -c 'source ../CI/lib/checks.sh && ci_block_sensitive_files \"$@\"' --"
        language: system
        always_run: true

      - id: gitleaks
        name: Block secrets in all files (gitleaks)
        entry: "bash -c 'source ../CI/lib/checks.sh && ci_scan_secrets'"
        language: system
        pass_filenames: false
        always_run: true

      - id: ci-check-silent-swallow
        name: Block error-swallow patterns (all files)
        entry: "bash -c 'source ../CI/lib/checks.sh && ci_check_silent_swallow'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-banned-words
        name: Check Banned Words
        entry: "bash -c 'source ../CI/lib/checks.sh && ci_check_banned_words'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-file-length
        name: Check File Length (max 512 lines)
        entry: "bash -c 'source ../CI/lib/checks.sh && ci_check_file_length'"
        language: system
        pass_filenames: false
        always_run: true

      - id: check-markdown-docs
        name: Check Markdown Docs
        entry: "uv run --project ../CI --no-sync python -m ci.check_markdown_docs --all-md --check-remote"
        language: system
        pass_filenames: false
        always_run: true

      - id: cargo-fmt
        name: Cargo Format Check
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        always_run: true
        files: \.rs$

      - id: cargo-clippy
        name: Cargo Clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        pass_filenames: false
        always_run: true
        files: \.rs$

      - id: check-commit-message
        name: Check Commit Message Format
        entry: "bash -c 'source ../CI/lib/checks.sh && ci_check_commit_message \"$1\"' --"
        language: system
        stages: [commit-msg]

      - id: block-coauthored
        name: Block Co-authored Commits
        entry: "bash -c 'source ../CI/lib/checks.sh && ci_block_coauthored \"$1\"' --"
        language: system
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: ci-check-push
        name: Pre-push Quality Gate (fmt + clippy + check + tests)
        entry: "make check-push"
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      - id: block-coauthored-history
        name: Block Commits with Blocked Patterns (full history scan)
        entry: "bash -c 'source ../CI/lib/checks.sh && ci_block_coauthored_history'"
        language: system
        stages: [pre-push]
        pass_filenames: false

      - id: verify-coverage
        name: Verify Test Coverage
        entry: "bash -c 'source ../CI/lib/checks.sh && ci_verify_coverage'"
        language: system
        stages: [pre-push]
        pass_filenames: false
